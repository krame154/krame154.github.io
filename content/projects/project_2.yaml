title: "Cloud-Based Data Pipeline and Machine Learning with AWS"

short_summary: >
  Developed a cloud-based data workflow using AWS services to store, query, and analyze large datasets.
  Demonstrates experience with scalable data processing and machine learning in a cloud environment.

tech_stack:
  - AWS S3
  - AWS Athena
  - AWS SageMaker
  - Python
  - SQL

problem_statement: >
  Processing large datasets locally can be inefficient and difficult to scale. This project explores how
  cloud computing tools can be used to efficiently store, query, and analyze data while supporting
  machine learning workflows.

approach: >
  Used AWS S3 to store datasets and organize data for analysis. Queried data using AWS Athena with SQL
  to perform filtering, aggregation, and transformations. Prepared datasets in the required format for
  machine learning and implemented models using AWS SageMaker, adjusting parameters and evaluating performance.
  This created a complete cloud-based data workflow from storage to analysis and modeling.

results_impact: >
  Successfully demonstrated the use of AWS tools to build a scalable data pipeline. The project highlights
  how large datasets can be efficiently processed and analyzed in the cloud, and how machine learning workflows
  can be integrated into that pipeline. This reflects real-world data engineering and cloud computing practices.

