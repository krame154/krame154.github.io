title: "Fast Food Unhealthiness vs Popularity Analysis"
image_path: "img/fastfood.png"
short_summary: >
  Analyzed whether more unhealthy fast food menus are associated with higher popularity.
  Combined nutritional data with sales and store metrics to explore how health and business
  success relate across major U.S. fast food chains.

tech_stack:
  - Python
  - pandas
  - matplotlib
  - data visualization

problem_statement: >
  Fast food is widely consumed, but it is unclear whether unhealthier menus actually
  drive greater popularity. Many consumers choose based on convenience and branding
  rather than nutrition. This project investigates whether chains with higher calorie,
  fat, and sodium content tend to generate more revenue and market presence.

approach: >
  Merged two datasets: one containing nutritional information (calories, sugar, saturated fat,
  trans fat, sodium) and another with business metrics (systemwide sales, average sales per unit,
  total store count). Created a custom "unhealthy score" based on nutritional values and used
  data visualizations to compare this score with popularity indicators across selected chains.

results_impact: >
  The analysis showed that there is no perfect correlation between unhealthiness and popularity,
  but many high-performing chains have moderately high unhealthy scores. McDonald's had the
  highest sales without being the most unhealthy, suggesting that branding, accessibility,
  and pricing also play significant roles in success. This highlights the complexity of
  consumer behavior beyond just nutrition.

